name: Deploy static site

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 Inject build version (commit hash)
      - name: Inject build version
        run: |
          BUILD_ID=${GITHUB_SHA::7}
          echo "Build ID: $BUILD_ID"

          sed -i "s|__BUILD_ID__|$BUILD_ID|g" index.html

          echo "Checking replacement..."
          grep "$BUILD_ID" index.html || (echo "❌ BUILD_ID not injected" && exit 1)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      # 🧪 Verify deployment (robust)
      - name: Verify deployment
        run: |
          BUILD_ID=${GITHUB_SHA::7}
          echo "Checking for build: $BUILD_ID"

          for i in {1..5}; do
            echo "Attempt $i..."

            RESPONSE=$(curl -s --fail --max-time 10 "https://dawidpolakowski.github.io/daily-log/?v=$(date +%s)" || echo "")

            if echo "$RESPONSE" | grep -q "$BUILD_ID"; then
              echo "✅ Deployment OK"
              exit 0
            fi

            echo "Response preview:"
            echo "$RESPONSE" | head -n 20

            sleep 60
          done

          echo "❌ NOT UPDATED after retries"
          exit 1