<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="app-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Daily Logs home">
        <span class="brand-mark">DL</span>
        <span>
          <strong>Daily Logs</strong>
          <small>Log viewer</small>
        </span>
      </a>

      <div class="header-actions">
        <a class="ghost-link" href="index.html">Back to logs</a>
        <a class="ghost-link" href="https://github.com/dawidpolakowski/daily-log" target="_blank" rel="noreferrer">
          View Repo
        </a>
      </div>
    </header>

    <main>
      <article class="reader">
        <div id="content" class="markdown-body">Loading...</div>
      </article>
    </main>
  </div>

  <script>
    const content = document.getElementById('content');
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');

    function isSafeLogPath(path) {
      return /^[0-9]{4}-[0-9]{2}\/[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$/.test(path)
        || /^[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$/.test(path);
    }

    if (!file || !isSafeLogPath(file)) {
      content.textContent = 'No valid log file specified.';
    } else {
      fetch(`logs/${file}`)
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Failed to load ${file}`);
          }

          return response.text();
        })
        .then((markdown) => {
          content.innerHTML = marked.parse(markdown);
        })
        .catch(() => {
          content.textContent = 'Failed to load log.';
        });
    }
  </script>
</body>

</html>
